<body data-page="research">
    <header>
        <div class="logo">
            <a href="index.html" data-t="logo_name"></a>
            <p class="site-tagline" data-t="site_subtitle"></p>
        </div>
        <button id="menu-toggle" class="menu-toggle" type="button" aria-label="Toggle menu" aria-expanded="false" aria-controls="primary-nav">
            <span></span>

        <nav id="primary-nav" class="top-nav" aria-label="Primary">

            <a href="research.html" data-t="nav_research" class="active" aria-current="page"></a>

    <main>

                <h1 class="section-title" data-t="research_title"></h1>
                <p class="page-intro" data-t="research_intro"></p>

                <h2 class="section-subtitle" data-t="research_subtitle1"></h2>

                    <article id="paper-gen-ai" class="publication-item">
                        <p class="paper-citation" data-t="research_paper1_citation"></p>

                    </article>

                    <article id="paper-marketplace" class="publication-item">
                        <p class="paper-citation" data-t="research_paper4_citation"></p>

                    <article id="paper-oli" class="publication-item">
                        <p class="paper-citation" data-t="research_paper5_citation"></p>

                    <article id="paper-new-wp" class="publication-item">
                        <p class="paper-citation" data-t="research_paper2_citation"></p>
                        <p class="paper-note" data-t="research_paper2_note"></p>

                    <article id="paper-dengue" class="publication-item">
                        <p class="paper-citation" data-t="research_paper3_citation"></p>
                        <p class="paper-note" data-t="research_paper3_note"></p>

                </div>
            </div>

    <button id="back-to-top" data-t-title="back_to_top_title" title="">
