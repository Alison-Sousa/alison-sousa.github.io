<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-t="doc_title"></title>

    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&display=swap" rel="stylesheet">
    <link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
</head>
<body data-page="home">
    <header>
        <div class="logo">
            <a href="index.html" data-t="logo_name"></a>
            <p class="site-tagline" data-t="site_subtitle"></p>
        </div>
        <button id="menu-toggle" class="menu-toggle" type="button" aria-label="Toggle menu" aria-expanded="false" aria-controls="primary-nav">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav id="primary-nav" class="top-nav" aria-label="Primary">
            <span class="nav-line" aria-hidden="true"></span>
            <a href="index.html" data-t="nav_home" class="active" aria-current="page"></a>
            <a href="research.html" data-t="nav_research"></a>
            <a href="cv.html" data-t="nav_cv"></a>
            <a href="teaching.html" data-t="nav_vitae"></a>
            <a href="contact.html" data-t="nav_contact"></a>
            <span class="nav-line" aria-hidden="true"></span>
        </nav>
    </header>

    <main>
        <section id="home" class="section section-home">
            <div class="home-grid">
                <div class="home-copy">
                    <p class="eyebrow" data-t="home_kicker"></p>
                    <div class="home-portrait">
                        <img src="../images/profile.jpg" data-t-alt="profile_photo_alt" alt="" draggable="false" oncontextmenu="return false;">
                    </div>
                    <p class="home-role" data-t="home_role"></p>

                    <div class="home-summary">
                        <p data-t="profile_p1"></p>
                        <p data-t="profile_p2"></p>
                        <p data-t="profile_p3"></p>
                    </div>

                    <div class="home-panels">
                        <article class="info-panel">
                            <h2 class="panel-title" data-t="cv_panel_title"></h2>
                            <p data-t="cv_panel_text"></p>
                        </article>

                        <article class="info-panel" id="contact">
                            <h2 class="panel-title" data-t="profile_contact_title"></h2>
                            <p data-t="profile_contact_p"></p>
                        </article>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <button id="back-to-top" data-t-title="back_to_top_title" title="">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="../style/script.js"></script>
</body>
</html>
